backend:
  name: git-gateway
  branch: main

# Enable Netlify Identity + Git Gateway on your Netlify site dashboard.
# For local editing: npx decap-server

media_folder: "images/uploads"
public_folder: "/images/uploads"

site_url: https://corecollective.com
display_url: https://corecollective.com
logo_url: https://corecollective.com/images/uploads/logo.png

collections:
  - name: agents
    label: Agents
    files:
      - label: Agent Profiles
        name: agents
        file: content/agents.json
        description: Edit team member bios, contact info, and headshots.
        fields:
          - label: Agents
            name: agents
            label_singular: Agent
            widget: list
            summary: "{{fields.name}} — {{fields.title}}"
            fields:
              - { label: Agent Route ID, name: agent_id, widget: string, hint: "Used for consultation routing (e.g. marsha-watson)" }
              - { label: Full Name, name: name, widget: string }
              - { label: Initials, name: initials, widget: string, hint: "2–3 letters shown when no headshot is uploaded" }
              - { label: Title / Role, name: title, widget: string }
              - { label: Bio, name: bio, widget: text }
              - label: Focus Tags
                name: focus_tags
                widget: list
                field: { label: Tag, name: tag, widget: string }
              - { label: Headshot Image, name: headshot, widget: image, required: false }
              - { label: Phone, name: phone, widget: string, required: false }
              - { label: Email, name: email, widget: string, required: false }
              - label: Default Consultation Type
                name: interest
                widget: select
                options: ["Seller", "Buyer", "Investor"]
                default: Buyer
              - { label: Display Order, name: order, widget: number, value_type: int, default: 0 }

  - name: neighborhoods
    label: Neighborhood Cards
    files:
      - label: Triangle Neighborhoods
        name: neighborhoods
        file: content/neighborhoods.json
        description: Edit Explore The Triangle grid cards.
        fields:
          - label: Neighborhoods
            name: neighborhoods
            label_singular: Neighborhood
            widget: list
            summary: "{{fields.name}} — {{fields.median_price}}"
            fields:
              - { label: Neighborhood Name, name: name, widget: string }
              - { label: Median Price, name: median_price, widget: string, hint: "e.g. $625K" }
              - { label: Description, name: description, widget: text }
              - label: Lifestyle Highlights
                name: highlights
                widget: list
                field: { label: Highlight, name: highlight, widget: string }
              - { label: Cover Photo, name: cover_photo, widget: image }
              - { label: Cover Photo Alt Text, name: cover_alt, widget: string, required: false }
              - { label: Display Order, name: order, widget: number, value_type: int, default: 0 }

  - name: testimonials
    label: Testimonials
    files:
      - label: Client Reviews
        name: testimonials
        file: content/testimonials.json
        description: Edit client quote cards.
        fields:
          - label: Testimonials
            name: testimonials
            label_singular: Testimonial
            widget: list
            summary: "{{fields.client_name}} — {{fields.location}}"
            fields:
              - { label: Quote, name: quote, widget: text }
              - { label: Client Name, name: client_name, widget: string }
              - { label: Location Tag, name: location, widget: string, hint: "e.g. Bought in Cary, NC" }
              - { label: Avatar Initials, name: initials, widget: string, hint: "1–3 letters" }
              - { label: Star Rating, name: stars, widget: number, value_type: int, min: 1, max: 5, default: 5 }
              - { label: Display Order, name: order, widget: number, value_type: int, default: 0 }

  - name: market_metrics
    label: Market Metrics
    files:
      - label: Site Statistics
        name: metrics
        file: content/market-metrics.json
        description: Hero trust bar, hero stats strip, and seller section metrics.
        fields:
          - label: Hero Trust Bar
            name: hero_trust
            widget: list
            label_singular: Stat
            summary: "{{fields.value}} — {{fields.label}}"
            max: 4
            fields:
              - { label: Value, name: value, widget: string, hint: "e.g. $50M+" }
              - { label: Label, name: label, widget: string }
          - label: Hero Bottom Stats
            name: hero_stats
            widget: list
            label_singular: Stat
            summary: "{{fields.value}} — {{fields.label}}"
            max: 4
            fields:
              - { label: Value, name: value, widget: string }
              - { label: Label, name: label, widget: string }
          - label: Seller Section Stats
            name: seller_stats
            widget: list
            label_singular: Stat
            summary: "{{fields.value}} — {{fields.label}}"
            max: 4
            fields:
              - { label: Value, name: value, widget: string }
              - { label: Label, name: label, widget: string }

  - name: blog
    label: Blog & Market Insights
    files:
      - label: Blog Posts
        name: blog
        file: content/blog.json
        description: Publish market analysis, community events, and lifestyle articles.
        fields:
          - label: Posts
            name: posts
            label_singular: Post
            widget: list
            summary: "{{fields.title}} — {{fields.date}}"
            fields:
              - { label: Title, name: title, widget: string }
              - { label: Publish Date, name: date, widget: datetime }
              - { label: Author, name: author, widget: string }
              - label: Category
                name: category
                widget: select
                options: ["Market Analysis", "Community Events", "Relocation", "Luxury Lifestyle"]
              - { label: Excerpt, name: excerpt, widget: text }
              - { label: Cover Image, name: cover_image, widget: image }
              - { label: Cover Alt Text, name: cover_alt, widget: string, required: false }
              - { label: Body, name: body, widget: markdown }
              - { label: Display Order, name: order, widget: number, value_type: int, default: 0 }
