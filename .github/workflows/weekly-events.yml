name: Weekly Community Events Draft

on:
  schedule:
    # Mondays 8:00 AM US Eastern Standard Time (13:00 UTC)
    - cron: '0 13 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-events:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate weekly events draft
        run: node scripts/fetch-events.js
        env:
          EVENTBRITE_TOKEN: ${{ secrets.EVENTBRITE_TOKEN }}

      - name: Commit and push blog draft
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/blog.json
          if git diff --staged --quiet; then
            echo "No blog.json changes to commit."
          else
            git commit -m "chore: weekly community events draft for blog"
            git push
          fi
